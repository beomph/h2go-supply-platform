<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2GO - 로그인</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-only theme-dark">
    <main class="auth-only-main">
        <section class="auth-only-card" aria-label="로그인">
            <div class="auth-only-toolbar">
                <button id="themeToggle" type="button" class="theme-toggle-switch" aria-label="라이트/다크 모드 전환" data-theme="dark">
                    <span class="theme-toggle-track">
                        <span class="theme-toggle-thumb"></span>
                    </span>
                    <span class="theme-toggle-label">Dark</span>
                </button>
            </div>
            <div class="auth-only-brand">
                <!-- 로고: 이미지(검정 배경 포함) 대신 텍스트 로고로 통일 -->
                <div class="brand-mark brand-mark--xl" aria-label="H2GO 로고">
                    <span class="brand-h2">H2</span><span class="brand-go">GO</span>
                </div>
            </div>
            <p class="auth-tagline">수소 주문·재고·운송을 한 화면에서</p>
            <div class="auth-feature-chips" role="list" aria-label="주요 기능">
                <span role="listitem">주문·이력</span>
                <span role="listitem">재고·예측</span>
                <span role="listitem">운송·스케줄</span>
            </div>

            <div class="auth-sections-stack" id="authSectionsStack">
                <div id="loginSection" class="auth-section auth-section--active" aria-live="polite" aria-hidden="false">
                    <form class="auth-form" id="loginForm" autocomplete="off">
                        <div class="form-group">
                            <label for="loginId">아이디</label>
                            <input type="text" id="loginId" placeholder="아이디를 입력하세요" required autocomplete="username" autofocus>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">비밀번호</label>
                            <input type="password" id="loginPassword" placeholder="예: h2go123?" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">로그인</button>
                    </form>
                    <div class="auth-only-links">
                        <button id="showRegisterBtn" type="button" class="btn btn-card-outline btn-full">회원가입</button>
                    </div>
                </div>
                <div id="registerSection" class="auth-section" aria-live="polite" aria-hidden="true">
            <form class="auth-form" id="registerForm" autocomplete="off" aria-label="회원가입">
                <div class="form-group">
                    <label>사업자분류 <span class="form-hint-inline">복수 선택 가능 · 공급자=판매, 수요자=구매</span></label>
                    <input type="hidden" id="registerBusinessPartyValue" value="[]" autocomplete="off">
                    <div class="business-party-group" role="group" aria-label="사업자분류">
                        <button type="button" class="business-party-btn" data-party="supplier" aria-pressed="false">공급자</button>
                        <button type="button" class="business-party-btn" data-party="transporter" aria-pressed="false">운송자</button>
                        <button type="button" class="business-party-btn" data-party="consumer" aria-pressed="false">수요자</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerUsername">사용자명</label>
                    <input type="text" id="registerUsername" placeholder="구매처/고객에게 보여질 사용자명을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="registerId">아이디</label>
                    <input type="text" id="registerId" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>회원권한</label>
                    <input type="hidden" id="registerAuthorityValue" value="manager" autocomplete="off">
                    <div class="authority-group" role="radiogroup" aria-label="회원권한">
                        <button type="button" class="authority-btn" data-authority="admin" aria-pressed="false">
                            <span class="authority-btn-title">관리자</span>
                            <span class="authority-btn-desc">모든 담당자 권한과 주문 결재 권한</span>
                        </button>
                        <button type="button" class="authority-btn is-selected" data-authority="manager" aria-pressed="true">
                            <span class="authority-btn-title">담당자</span>
                            <span class="authority-btn-desc">주문 송·수신, 변경 및 확정, 물량 입력 권한</span>
                        </button>
                        <button type="button" class="authority-btn" data-authority="monitoring" aria-pressed="false">
                            <span class="authority-btn-title">모니터링</span>
                            <span class="authority-btn-desc">주문 조회·단순 모니터링</span>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="registerPassword">비밀번호</label>
                    <input type="password" id="registerPassword" placeholder="예: h2go123?" required minlength="4">
                </div>
                <div class="form-group">
                    <label for="registerPasswordConfirm">비밀번호 확인</label>
                    <input type="password" id="registerPasswordConfirm" placeholder="비밀번호를 다시 입력" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">회원가입 후 로그인</button>
                <button id="showLoginBtn" type="button" class="btn btn-secondary btn-full">로그인으로 돌아가기</button>
            </form>
                </div>
            </div>
        </section>
    </main>

    <script src="/h2go-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
