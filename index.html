<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2GO - 로그인</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-only">
    <main class="auth-only-main">
        <section class="auth-only-card" aria-label="로그인">
            <div class="auth-only-brand">
                <!-- 로고: 이미지(검정 배경 포함) 대신 텍스트 로고로 통일 -->
                <div class="brand-mark brand-mark--xl" aria-label="H2GO 로고">
                    <span class="brand-h2">H2</span><span class="brand-go">GO</span>
                </div>
            </div>

            <form class="auth-form" id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="loginId">아이디</label>
                    <input type="text" id="loginId" placeholder="아이디를 입력하세요" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="loginPassword">비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="예: h2go123?" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">로그인</button>
            </form>

            <div class="auth-only-links">
                <button id="showRegisterBtn" type="button" class="btn btn-card-outline btn-full">회원가입</button>
            </div>

            <form class="auth-form is-hidden" id="registerForm" autocomplete="off" aria-label="회원가입">
                <div class="form-group">
                    <label for="registerName">이름 / 회사명</label>
                    <input type="text" id="registerName" placeholder="이름 또는 회사명을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="registerId">아이디</label>
                    <input type="text" id="registerId" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">비밀번호</label>
                    <input type="password" id="registerPassword" placeholder="예: h2go123?" required minlength="4">
                </div>
                <div class="form-group">
                    <label for="registerPasswordConfirm">비밀번호 확인</label>
                    <input type="password" id="registerPasswordConfirm" placeholder="비밀번호를 다시 입력" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">회원가입 후 로그인</button>
                <button id="showLoginBtn" type="button" class="btn btn-secondary btn-full">로그인으로 돌아가기</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
